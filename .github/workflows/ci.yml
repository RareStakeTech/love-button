name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  validate-manifest:
    name: Validate manifest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Validate manifest.json
        run: |
          node -e "
            const m = JSON.parse(require('fs').readFileSync('manifest.json','utf8'));
            if (m.manifest_version !== 3) throw new Error('Not MV3');
            if (!m.version) throw new Error('Missing version');
            if (!m.background?.service_worker) throw new Error('Missing service_worker');
            console.log('manifest.json valid — version', m.version);
          "

  check-files:
    name: Verify all referenced files exist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Check content scripts
        run: |
          node -e "
            const fs = require('fs');
            const m = JSON.parse(fs.readFileSync('manifest.json','utf8'));
            const missing = [];
            for (const cs of m.content_scripts || []) {
              for (const f of cs.js || []) {
                if (!fs.existsSync(f)) missing.push(f);
              }
            }
            if (m.background?.service_worker && !fs.existsSync(m.background.service_worker)) {
              missing.push(m.background.service_worker);
            }
            if (missing.length) throw new Error('Missing files: ' + missing.join(', '));
            console.log('All referenced files present');
          "
      - name: Check icons
        run: |
          node -e "
            const fs = require('fs');
            const m = JSON.parse(fs.readFileSync('manifest.json','utf8'));
            for (const [size, path] of Object.entries(m.icons || {})) {
              if (!fs.existsSync(path)) throw new Error('Missing icon: ' + path);
            }
            console.log('All icons present');
          "

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install ESLint
        run: npm install --no-save eslint
      - name: Lint content scripts
        run: |
          npx eslint content/*.js background.js popup.js options.js \
            --env browser,es2020 \
            --rule "no-undef: warn" \
            --rule "no-unused-vars: warn" \
            --ignore-pattern "node_modules/**" || true

  build-firefox:
    name: Generate Firefox manifest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Generate Firefox manifest
        run: node build-firefox.js
      - name: Validate Firefox manifest
        run: |
          node -e "
            const m = JSON.parse(require('fs').readFileSync('manifest.firefox.json','utf8'));
            if (!m.browser_specific_settings?.gecko?.id) throw new Error('Missing gecko id');
            if (m.background?.type === 'module') throw new Error('Firefox manifest must not have type:module');
            console.log('manifest.firefox.json valid');
          "
